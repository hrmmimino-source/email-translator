<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Translator</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f7f7f5; color: #1a1a1a; font-size: 13px; padding: 12px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #e5e5e0; }
  .logo { width: 28px; height: 28px; background: #2d2d8e; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; flex-shrink: 0; }
  .title { font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .subtitle { font-size: 11px; color: #888; }
  .status-pill { margin-left: auto; font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .status-idle { background: #ececec; color: #666; }
  .status-detecting { background: #fff8e1; color: #b45309; }
  .status-ready { background: #e7f5e9; color: #1a6b2a; }
  .status-error { background: #fdecea; color: #b91c1c; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e5e0; padding: 12px; margin-bottom: 10px; }
  .card-label { font-size: 10px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .lang-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 6px; background: #eeeef9; color: #2d2d8e; margin-bottom: 8px; }
  .translated-body { font-size: 12px; color: #333; max-height: 160px; overflow-y: auto; padding-right: 4px; line-height: 1.6; }
  .placeholder { color: #bbb; font-style: italic; font-size: 12px; text-align: center; padding: 20px 0; }
  .reply-label { font-size: 10px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  textarea { width: 100%; min-height: 70px; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: #1a1a1a; resize: vertical; outline: none; background: #fafaf8; line-height: 1.5; }
  textarea:focus { border-color: #2d2d8e; background: #fff; }
  .row { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
  select { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 7px 8px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: #1a1a1a; background: #fafaf8; outline: none; }
  select:focus { border-color: #2d2d8e; }
  button { padding: 7px 14px; border-radius: 6px; border: none; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #2d2d8e; color: white; }
  .btn-primary:hover { background: #23237a; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .btn-secondary { background: #ececec; color: #333; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc; border-top-color: #2d2d8e; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success-msg { font-size: 11px; color: #1a6b2a; background: #e7f5e9; border-radius: 6px; padding: 6px 10px; margin-top: 6px; display: none; }
  .error-msg { font-size: 11px; color: #b91c1c; background: #fdecea; border-radius: 6px; padding: 6px 10px; margin-top: 6px; display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🌐</div>
  <div>
    <div class="title">Email Translator</div>
    <div class="subtitle">Powered by MyMemory</div>
  </div>
  <span class="status-pill status-idle" id="status">მზად</span>
</div>

<div class="card">
  <div class="card-label">შემოსული მეილი</div>
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
    <span style="font-size:11px;color:#999;">თარგმანი:</span>
    <select id="incoming-lang" style="flex:1;border:1px solid #ddd;border-radius:6px;padding:4px 8px;font-size:11px;background:#fafaf8;">
      <option value="en">ინგლისურად</option>
      <option value="ka">ქართულად</option>
    </select>
  </div>
  <div id="detected-lang" class="lang-badge" style="display:none">
    <span id="lang-flag">🌍</span>
    <span id="lang-name">—</span>
    <span id="target-label">→ ინგლისური</span>
  </div>
  <div id="translated-output" class="translated-body">
    <div class="placeholder">გახსენი მეილი, შემდეგ დააჭირე "თარგმნა"</div>
  </div>
  <div style="margin-top:8px; display:flex; gap:6px;">
    <button class="btn-primary btn-sm" onclick="translateIncoming()" id="translate-btn">თარგმნა</button>
    <button class="btn-secondary btn-sm" onclick="clearTranslation()">გასუფთავება</button>
  </div>
</div>

<div class="card">
  <div class="reply-label">პასუხი (ავტო-თარგმანი)</div>
  <textarea id="reply-text" placeholder="დაწერე ინგლისურად ან ქართულად..."></textarea>
  <div class="row">
    <select id="target-lang">
      <option value="English">→ ინგლისური</option>
      <option value="Georgian">→ ქართული</option>
      <option value="Russian">→ რუსული</option>
      <option value="German">→ გერმანული</option>
      <option value="French">→ ფრანგული</option>
      <option value="Spanish">→ ესპანური</option>
      <option value="Italian">→ იტალიური</option>
      <option value="Polish">→ პოლონური</option>
      <option value="Greek">→ ბერძნული</option>
      <option value="Portuguese">→ პორტუგალიური</option>
      <option value="Hebrew">→ ივრითი</option>
      <option value="Chinese">→ ჩინური</option>
      <option value="Japanese">→ იაპონური</option>
      <option value="Arabic">→ არაბული</option>
    </select>
    <button class="btn-primary" onclick="translateReply()" id="reply-btn">თარგმნა</button>
  </div>
  <div class="success-msg" id="success-msg">✓ თარგმანი მზადაა — მონიშნე და დააკოპირე!</div>
  <div class="error-msg" id="error-msg"></div>
</div>

<script>
Office.onReady(function(info) {
  setStatus('მზად', 'status-ready');
});

const LANG_CODES = {
  'English':'en','Georgian':'ka','Russian':'ru','German':'de','French':'fr',
  'Spanish':'es','Italian':'it','Polish':'pl','Greek':'el',
  'Portuguese':'pt','Hebrew':'he','Chinese':'zh','Japanese':'ja','Arabic':'ar'
};

const LANG_FLAGS = {
  'de':'DE','fr':'FR','ru':'RU','es':'ES','it':'IT','pl':'PL',
  'el':'GR','pt':'BR','zh':'CN','ja':'JP','ar':'AR','en':'EN','ka':'GE'
};

const LANG_NAMES = {
  'de':'German','fr':'French','ru':'Russian','es':'Spanish','it':'Italian',
  'pl':'Polish','el':'Greek','pt':'Brazilian Portuguese',
  'zh':'Chinese','ja':'Japanese','ar':'Arabic','en':'English','ka':'Georgian'
};

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status-pill ' + cls;
}

async function myMemoryTranslate(text, fromLang, toLang) {
  const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + fromLang + '|' + toLang;
  const response = await fetch(url);
  if (!response.ok) throw new Error('სერვისი მიუწვდომელია');
  const data = await response.json();
  if (data.responseStatus !== 200) throw new Error(data.responseDetails || 'თარგმანის შეცდომა');
  return data.responseData.translatedText;
}

async function translateIncoming() {
  const btn = document.getElementById('translate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>თარგმნა...';
  setStatus('მუშაობს...', 'status-detecting');

  try {
    const item = Office.context.mailbox.item;
    item.body.getAsync(Office.CoercionType.Text, async function(result) {
      if (result.status !== Office.AsyncResultStatus.Succeeded) {
        showError('მეილის წაკითხვა ვერ მოხერხდა');
        resetBtn(); return;
      }

      const emailText = result.value.substring(0, 1000).trim();
      if (!emailText) { showError('მეილი ცარიელია'); resetBtn(); return; }

      try {
        const incomingTarget = document.getElementById('incoming-lang').value;
        document.getElementById('target-label').textContent = incomingTarget === 'ka' ? '→ ქართული' : '→ ინგლისური';
        const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(emailText.substring(0, 500)) + '&langpair=autodetect|' + incomingTarget + '&de=translation@email.com';
        const r = await fetch(url);
        const d = await r.json();
        const translated = d.responseData.translatedText;
        const detectedCode = (d.responseData.detectedLanguage || 'unknown').toLowerCase().split('-')[0];

        if (detectedCode === 'en') {
          document.getElementById('translated-output').innerHTML = '<div class="placeholder">მეილი უკვე ინგლისურადაა — თარგმანი საჭირო არ არის.</div>';
          document.getElementById('detected-lang').style.display = 'none';
          setStatus('ინგლისური', 'status-ready');
        } else {
          const flag = LANG_FLAGS[detectedCode] || '🌍';
          const langName = LANG_NAMES[detectedCode] || detectedCode.toUpperCase();
          document.getElementById('lang-flag').textContent = flag;
          document.getElementById('lang-name').textContent = langName;
          document.getElementById('detected-lang').style.display = 'inline-flex';
          document.getElementById('translated-output').textContent = translated;
          setStatus('თარგმნილია', 'status-ready');

          const sel = document.getElementById('target-lang');
          for (let opt of sel.options) {
            if (LANG_CODES[opt.value] === detectedCode) { sel.value = opt.value; break; }
          }
        }
      } catch(e) {
        showError('შეცდომა: ' + e.message);
        setStatus('შეცდომა', 'status-error');
      }
      resetBtn();
    });
  } catch(e) {
    showError('შეცდომა: ' + e.message);
    setStatus('შეცდომა', 'status-error');
    resetBtn();
  }
}

async function translateReply() {
  const text = document.getElementById('reply-text').value.trim();
  if (!text) { alert('ჩაწერე პასუხი!'); return; }

  const targetLang = document.getElementById('target-lang').value;
  if (targetLang === 'English') { insertReply(text); return; }

  const targetCode = LANG_CODES[targetLang] || 'en';
  const btn = document.getElementById('reply-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  setStatus('თარგმნა...', 'status-detecting');

  try {
    const georgianChars = (text.match(/[\u10D0-\u10FF]/g) || []).length;
    const sourceLang = georgianChars > 3 ? 'ka' : 'en';
    const translated = await myMemoryTranslate(text, sourceLang, targetCode);
    const translatedText = translated.trim();
    document.getElementById('reply-text').value = translatedText;
    document.getElementById('success-msg').style.display = 'block';
    setStatus('თარგმნილია!', 'status-ready');
    setTimeout(() => { document.getElementById('success-msg').style.display = 'none'; }, 4000);
  } catch(e) {
    showError('შეცდომა: ' + e.message);
    setStatus('შეცდომა', 'status-error');
  }

  btn.disabled = false;
  btn.textContent = "თარგმნა";
}

function insertReply(text) {
  document.getElementById('reply-text').value = text;
}

function clearTranslation() {
  document.getElementById('translated-output').innerHTML = '<div class="placeholder">გახსენი მეილი, შემდეგ დააჭირე "თარგმნა"</div>';
  document.getElementById('detected-lang').style.display = 'none';
  setStatus('მზად', 'status-ready');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function resetBtn() {
  const btn = document.getElementById('translate-btn');
  btn.disabled = false;
  btn.textContent = 'თარგმნა';
}
</script>
</body>
</html>
