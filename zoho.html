<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Translator — Zoho</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f7f7f5; color: #1a1a1a; font-size: 13px; padding: 12px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #e5e5e0; }
  .logo { width: 28px; height: 28px; background: #e05a0c; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; flex-shrink: 0; }
  .title { font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .subtitle { font-size: 11px; color: #888; }
  .status-pill { margin-left: auto; font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .status-idle { background: #ececec; color: #666; }
  .status-detecting { background: #fff8e1; color: #b45309; }
  .status-ready { background: #e7f5e9; color: #1a6b2a; }
  .status-error { background: #fdecea; color: #b91c1c; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e5e0; padding: 12px; margin-bottom: 10px; }
  .card-label { font-size: 10px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .lang-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 6px; background: #fff3ee; color: #e05a0c; margin-bottom: 8px; }
  .translated-body { font-size: 12px; color: #333; max-height: 200px; overflow-y: auto; padding-right: 4px; line-height: 1.6; }
  .placeholder { color: #bbb; font-style: italic; font-size: 12px; text-align: center; padding: 20px 0; }
  .hint { font-size: 11px; color: #888; background: #f7f7f5; border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; line-height: 1.5; }
  .reply-label { font-size: 10px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  textarea { width: 100%; min-height: 80px; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: #1a1a1a; resize: vertical; outline: none; background: #fafaf8; line-height: 1.5; }
  textarea:focus { border-color: #e05a0c; background: #fff; }
  .translated-result { width: 100%; min-height: 80px; border: 1px solid #fdd0b8; border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: #1a1a1a; resize: vertical; outline: none; background: #fff8f5; line-height: 1.5; margin-top: 8px; display: none; }
  .row { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
  select { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 7px 8px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: #1a1a1a; background: #fafaf8; outline: none; }
  select:focus { border-color: #e05a0c; }
  button { padding: 7px 14px; border-radius: 6px; border: none; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #e05a0c; color: white; }
  .btn-primary:hover { background: #c24d0a; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .btn-secondary { background: #ececec; color: #333; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-copy { background: #2d2d8e; color: white; padding: 5px 10px; font-size: 11px; border-radius: 6px; border: none; cursor: pointer; margin-top: 6px; width: 100%; }
  .btn-copy:hover { background: #23237a; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc; border-top-color: #e05a0c; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success-msg { font-size: 11px; color: #1a6b2a; background: #e7f5e9; border-radius: 6px; padding: 6px 10px; margin-top: 6px; display: none; }
  .error-msg { font-size: 11px; color: #b91c1c; background: #fdecea; border-radius: 6px; padding: 6px 10px; margin-top: 6px; display: none; }
  .paste-hint { font-size: 10px; color: #e05a0c; margin-top: 4px; display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🌐</div>
  <div>
    <div class="title">Email Translator</div>
    <div class="subtitle">Zoho Mail · MyMemory</div>
  </div>
  <span class="status-pill status-idle" id="status">მზად</span>
</div>

<div class="hint">
  📋 Zoho-ში გამოსაყენებლად: მეილის ტექსტი <b>დააკოპირე</b> და ქვემოთ ჩასვი.
</div>

<!-- Incoming translation -->
<div class="card">
  <div class="card-label">შემოსული მეილის თარგმანი</div>

  <textarea id="incoming-text" placeholder="მეილის ტექსტი ჩასვი აქ..."></textarea>
  <div style="margin-top:8px;display:flex;gap:6px;">
    <button class="btn-primary btn-sm" onclick="translateIncoming()" id="translate-btn">თარგმნა</button>
    <button class="btn-secondary btn-sm" onclick="clearIncoming()">გასუფთავება</button>
  </div>
  <div id="detected-lang" class="lang-badge" style="display:none;margin-top:8px;">
    <span id="lang-flag">🌍</span>
    <span id="lang-name">—</span>
    <span id="target-label">→ ინგლისური</span>
  </div>
  <div id="translated-output" class="translated-body" style="margin-top:6px;display:none;"></div>
  <button class="btn-copy" id="copy-incoming-btn" style="display:none;" onclick="copyIncoming()">📋 თარგმანი დააკოპირე</button>
  <div class="error-msg" id="incoming-error"></div>
</div>

<!-- Reply translation -->
<div class="card">
  <div class="reply-label">პასუხის თარგმანი</div>
  <textarea id="reply-text" placeholder="დაწერე ინგლისურად ან ქართულად..."></textarea>
  <div class="row">
    <select id="target-lang">
      <option value="English">→ ინგლისური</option>
      <option value="Georgian">→ ქართული</option>
      <option value="Russian">→ რუსული</option>
      <option value="German">→ გერმანული</option>
      <option value="French">→ ფრანგული</option>
      <option value="Spanish">→ ესპანური</option>
      <option value="Italian">→ იტალიური</option>
      <option value="Polish">→ პოლონური</option>
      <option value="Greek">→ ბერძნული</option>
      <option value="Portuguese">→ პორტუგალიური</option>
      <option value="Hebrew">→ ივრითი</option>
      <option value="Chinese">→ ჩინური</option>
      <option value="Japanese">→ იაპონური</option>
      <option value="Arabic">→ არაბული</option>
    </select>
    <button class="btn-primary" onclick="translateReply()" id="reply-btn">თარგმნა</button>
  </div>
  <textarea id="reply-result" class="translated-result" placeholder="თარგმანი გამოჩნდება აქ..." readonly></textarea>
  <button class="btn-copy" id="copy-reply-btn" style="display:none;" onclick="copyReply()">📋 თარგმანი დააკოპირე</button>
  <div class="success-msg" id="success-msg">✓ დაკოპირდა — ჩასვი მეილში (Ctrl+V)!</div>
  <div class="error-msg" id="reply-error"></div>
</div>

<script>
const LANG_CODES = {
  'English':'en','Georgian':'ka','Russian':'ru','German':'de','French':'fr',
  'Spanish':'es','Italian':'it','Polish':'pl','Greek':'el',
  'Portuguese':'pt','Hebrew':'he','Chinese':'zh','Japanese':'ja','Arabic':'ar'
};

const LANG_FLAGS = {
  'de':'🇩🇪','fr':'🇫🇷','ru':'🇷🇺','es':'🇪🇸','it':'🇮🇹','pl':'🇵🇱',
  'el':'🇬🇷','pt':'🇵🇹','he':'🇮🇱','zh':'🇨🇳','ja':'🇯🇵','ar':'🇸🇦',
  'en':'🇬🇧','ka':'🇬🇪'
};

const LANG_NAMES = {
  'de':'German','fr':'French','ru':'Russian','es':'Spanish','it':'Italian',
  'pl':'Polish','el':'Greek','pt':'Portuguese','he':'Hebrew',
  'zh':'Chinese','ja':'Japanese','ar':'Arabic','en':'English','ka':'Georgian'
};

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status-pill ' + cls;
}

async function myMemoryTranslate(text, fromLang, toLang) {
  const params = new URLSearchParams({ q: text, langpair: fromLang + '|' + toLang, de: 'translation@email.com' });
  const response = await fetch('https://api.mymemory.translated.net/get?' + params.toString());
  if (!response.ok) throw new Error('სერვისი მიუწვდომელია');
  const data = await response.json();
  if (data.responseStatus !== 200) throw new Error(data.responseDetails || 'შეცდომა');
  return { text: data.responseData.translatedText, detectedLang: (data.responseData.detectedLanguage || 'unknown').toLowerCase().split('-')[0] };
}

async function translateIncoming() {
  const text = document.getElementById('incoming-text').value.trim();
  if (!text) { alert('ჩასვი მეილის ტექსტი!'); return; }

  const btn = document.getElementById('translate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>თარგმნა...';
  setStatus('მუშაობს...', 'status-detecting');
  document.getElementById('incoming-error').style.display = 'none';

  try {
    const result = await myMemoryTranslate(text.substring(0, 800), 'autodetect', 'en');

    const flag = LANG_FLAGS[result.detectedLang] || '🌍';
    const langName = LANG_NAMES[result.detectedLang] || result.detectedLang.toUpperCase();
    document.getElementById('lang-flag').textContent = flag;
    document.getElementById('lang-name').textContent = langName;

    document.getElementById('detected-lang').style.display = 'inline-flex';
    document.getElementById('translated-output').textContent = result.text;
    document.getElementById('translated-output').style.display = 'block';
    document.getElementById('copy-incoming-btn').style.display = 'block';
    setStatus('თარგმნილია', 'status-ready');
  } catch(e) {
    const el = document.getElementById('incoming-error');
    el.textContent = 'შეცდომა: ' + e.message;
    el.style.display = 'block';
    setStatus('შეცდომა', 'status-error');
  }

  btn.disabled = false;
  btn.textContent = 'თარგმნა';
}

async function translateReply() {
  const text = document.getElementById('reply-text').value.trim();
  if (!text) { alert('ჩაწერე პასუხი!'); return; }

  const targetLang = document.getElementById('target-lang').value;
  const targetCode = LANG_CODES[targetLang] || 'en';

  const btn = document.getElementById('reply-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  setStatus('თარგმნა...', 'status-detecting');
  document.getElementById('reply-error').style.display = 'none';

  try {
    const georgianChars = (text.match(/[\u10D0-\u10FF]/g) || []).length;
    const sourceLang = georgianChars > 3 ? 'ka' : 'en';
    const result = await myMemoryTranslate(text, sourceLang, targetCode);

    document.getElementById('reply-result').value = result.text;
    document.getElementById('reply-result').style.display = 'block';
    document.getElementById('copy-reply-btn').style.display = 'block';
    setStatus('თარგმნილია', 'status-ready');
  } catch(e) {
    const el = document.getElementById('reply-error');
    el.textContent = 'შეცდომა: ' + e.message;
    el.style.display = 'block';
    setStatus('შეცდომა', 'status-error');
  }

  btn.disabled = false;
  btn.textContent = 'თარგმნა';
}

function copyIncoming() {
  const text = document.getElementById('translated-output').textContent;
  copyText(text, 'copy-incoming-btn');
}

function copyReply() {
  const text = document.getElementById('reply-result').value;
  copyText(text, 'copy-reply-btn');
}

function copyText(text, btnId) {
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  const btn = document.getElementById(btnId);
  const orig = btn.textContent;
  btn.textContent = '✓ დაკოპირდა!';
  setTimeout(() => { btn.textContent = orig; }, 2000);
}

function clearIncoming() {
  document.getElementById('incoming-text').value = '';
  document.getElementById('translated-output').textContent = '';
  document.getElementById('translated-output').style.display = 'none';
  document.getElementById('detected-lang').style.display = 'none';
  document.getElementById('copy-incoming-btn').style.display = 'none';
  setStatus('მზად', 'status-ready');
}
  window.addEventListener("message", (event) => {
  const text = event.data;
  if (text && text.length > 20) {
    document.getElementById("incoming-text").value = text;
  }
});
</script>
</body>
</html>
